<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Traffic Light FSM Demo</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f3f7;
        display: flex;
        justify-content: center;
        margin-top: 60px;
        font-family: monospace;
      }

      .app {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: 420px;
        text-align: center;
      }

      h1 {
        margin-top: 0;
      }

      .traffic-light {
        background: #222;
        padding: 20px;
        border-radius: 14px;
        width: 120px;
        margin: 20px auto;
      }

      .light {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        margin: 12px auto;
        background: #666;
        transition: all 0.6s ease;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.6);
      }

      .light.active.red {
        background: red;
        box-shadow: 0 0 20px red;
      }

      .light.active.yellow {
        background: yellow;
        box-shadow: 0 0 20px yellow;
      }

      .light.active.green {
        background: limegreen;
        box-shadow: 0 0 20px limegreen;
      }

      .controls {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      button {
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: #7c826f;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #6a6c6f;
      }

      .trace {
        margin-top: 20px;
        background: #cecdcd;
        color: rgb(22, 24, 22);
        height: 350px;
        overflow-y: auto;
        padding: 10px;
        border-color: rgb(157, 156, 156);
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h2>Traffic Light State Machine</h2>

      <div class="traffic-light">
        <div class="light red" id="red"></div>
        <div class="light yellow" id="yellow"></div>
        <div class="light green" id="green"></div>
      </div>

      <div>Current State: <b id="state"></b></div>

      <div class="controls">
        <button id="next">Next</button>
        <button id="start">Auto Cycle</button>
        <button id="stop">Stop</button>
        <button id="reset">Reset</button>
      </div>

      <div class="trace" id="trace"></div>
    </div>

    <script>
    
    // finite state machine implementation

      function createFSM(descriptor) {
        let state = descriptor.initialState;

        const instance = {
          get currentState() {
            return state;
          },
          setState(newState) {
            const previous = state;
            state = newState;
            descriptor.onChange?.(previous, newState);
            updateUI();
          },
          reset() {
            const previous = state;
            state = descriptor.initialState;
            descriptor.onChange?.(previous, state);
            updateUI();
          },
          send(message) {
            const handler = descriptor.states[state];
            handler.onMessage(message, instance);
          },
        };
        return instance;
      }

      const traceEL = document.getElementById('trace');

      function log(text) {
        const line = document.createElement('div');
        line.textContent = text;
        traceEL.appendChild(line);
        traceEL.scrollTop = traceEL.scrollHeight;
      }

      const red = document.getElementById('red');
      const yellow = document.getElementById('yellow');
      const green = document.getElementById('green');
      const stateLabel = document.getElementById('state');

      function updateUI() {
        red.classList.remove('active');
        yellow.classList.remove('active');
        green.classList.remove('active');

        const state = trafficLight.currentState;

        if (state === 'red') red.classList.add('active');
        if (state === 'yellow') yellow.classList.add('active');
        if (state === 'green') green.classList.add('active');
        stateLabel.textContent = state;
      }

      // TRAFFIC LIGHT FSM
      const trafficLight = createFSM({
        initialState: 'red',

        onChange(from, to) {
          log(`STATE CHANGE: ${from} → ${to}`);
        },

        states: {
          red: {
            onMessage(message, instance) {
              if (message.payload.type === 'next') {
                instance.setState('green');
              }
            },
          },

          green: {
            onMessage(message, instance) {
              if (message.payload.type === 'next') {
                instance.setState('yellow');
              }
            },
          },

          yellow: {
            onMessage(message, instance) {
              if (message.payload.type === 'next') {
                instance.setState('red');
              }
            },
          },
        },
      });

      // message sender
      function send(payload) {
        trafficLight.send({
          payload,
          reply() {},
        });
      }

      // cycle
      let interval = null;
      function startAuto() {
        if (interval) return;
        interval = setInterval(() => {
          send({ type: 'next' });
        }, 2000);
      }
      function stopAuto() {
        clearInterval(interval);
        interval = null;
      }

      // btns
      document.getElementById('next').onclick = () => send({ type: 'next' });
      document.getElementById('start').onclick = startAuto;
      document.getElementById('stop').onclick = stopAuto;
      document.getElementById('reset').onclick = () => trafficLight.reset();

      // start up
      updateUI();
      log('Traffic light ready');
    </script>
  </body>
</html>
